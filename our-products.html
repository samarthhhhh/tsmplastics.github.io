<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1.0" />
  <title>Our Products | TSM Plastics</title>

  <style>
    :root{
      --brand:#0a4d8c; --ink:#222; --muted:#666; --bg:#f7f7f7; --radius:12px; --maxw:1100px;
      --shadow:0 2px 8px rgba(0,0,0,.06); --thumbBg:#fff;
    }

    *{box-sizing:border-box}
    html,body{
      margin:0;padding:0;
      font-family:Arial,Helvetica,sans-serif;
      color:var(--ink);
      background:var(--bg);
      overflow-x:hidden
    }

    img{display:block;max-width:100%;height:auto}

    /* NAV (minimal, finally honest) */
    nav.site-nav{
      background:var(--brand);
      color:#fff;
      position:sticky;
      top:0;
      z-index:1000;
      box-shadow:0 2px 10px rgba(0,0,0,.08)
    }

    .nav-inner{
      max-width:var(--maxw);
      margin:auto;
      display:flex;
      justify-content:center;
      padding:.7rem 1rem;
    }

    .nav-inner a{
      color:#fff;
      text-decoration:none;
      padding:.4rem .8rem;
      border-radius:8px;
    }

    .nav-inner a:hover{
      background:rgba(255,255,255,.15)
    }

    /* MAIN */
    main{
      max-width:var(--maxw);
      margin:auto;
      padding:2rem 1rem
    }

    h1,h2{
      color:var(--brand);
      margin-top:0
    }

    .product-section{
      margin-bottom:3rem
    }

    .product-section h2{
      border-bottom:2px solid var(--brand);
      display:inline-block;
      padding-bottom:4px;
      margin-bottom:1rem
    }

    ul.product-list{
      list-style:none;
      padding:0;
      margin:0;
      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(230px,1fr));
      gap:1.2rem
    }

    ul.product-list li{
      background:#fff;
      border-radius:var(--radius);
      box-shadow:var(--shadow);
      overflow:hidden;
      transition:.2s;
    }

    ul.product-list li:hover{
      transform:translateY(-3px)
    }

    .thumb-wrap{
      background:var(--thumbBg);
      padding:10px;
      aspect-ratio:4/3;
      display:flex;
      align-items:center;
      justify-content:center;
    }

    .thumb{
      width:100%;
      height:100%;
      object-fit:contain
    }

    ul.product-list p{
      margin:0;
      padding:.8rem;
      font-size:.95rem;
      border-top:1px solid #eee
    }

    /* LIGHTBOX */
    .lightbox{
      position:fixed;
      inset:0;
      background:rgba(0,0,0,.75);
      display:none;
      align-items:center;
      justify-content:center;
      z-index:9999;
      padding:20px
    }

    .lightbox[open]{display:flex}

    .lightbox-inner{
      max-width:95vw;
      max-height:90vh;
      background:#000;
      border-radius:10px;
      overflow:hidden
    }

    .lightbox-img{
      max-width:100%;
      max-height:80vh;
      object-fit:contain
    }

    .lightbox-caption{
      color:#fff;
      padding:.6rem;
      background:rgba(0,0,0,.6)
    }

    .lightbox-close{
      position:absolute;
      top:14px;
      right:16px;
      background:#fff;
      border:0;
      border-radius:50%;
      width:36px;
      height:36px;
      cursor:pointer;
      font-size:18px
    }

    footer{
      background:var(--brand);
      color:#fff;
      text-align:center;
      padding:1.2rem;
      margin-top:2rem
    }
  </style>
</head>

<body>

  <!-- NAV (fixed reality version) -->
  <nav class="site-nav">
    <div class="nav-inner">
      <a href="/">Home</a>
    </div>
  </nav>

  <main>
    <h1>Our Products</h1>
    <p>Explore our product range. Click any image to enlarge.</p>

    <section class="product-section">
      <h2>Blow Moulding</h2>

      <ul class="product-list">

        <li>
          <a href="20250814_1231_Professional Product Shoot_remix_01k2knz17pefsv341gv2wectqx.png" class="prod" data-caption="Yellow handled jerrycan">
            <div class="thumb-wrap">
              <img class="thumb" src="20250814_1231_Professional Product Shoot_remix_01k2knz17pefsv341gv2wectqx.png">
            </div>
          </a>
          <p>Yellow handled jerrycan</p>
        </li>

        <li>
          <a href="431f8180-2db3-4e5a-a78c-29700554fa66.png" class="prod" data-caption="Yellow plastic bat">
            <div class="thumb-wrap">
              <img class="thumb" src="431f8180-2db3-4e5a-a78c-29700554fa66.png">
            </div>
          </a>
          <p>Yellow plastic bat</p>
        </li>

      </ul>
    </section>
  </main>

  <footer>
    © 2025 TSM Plastics
  </footer>

  <!-- LIGHTBOX -->
  <dialog class="lightbox" id="lightbox">
    <button class="lightbox-close" id="lbClose">×</button>
    <div class="lightbox-inner">
      <img class="lightbox-img" id="lbImg">
      <div class="lightbox-caption" id="lbCap"></div>
    </div>
  </dialog>

  <script>
    const lb = document.getElementById('lightbox');
    const img = document.getElementById('lbImg');
    const cap = document.getElementById('lbCap');

    document.querySelectorAll('.prod').forEach(el=>{
      el.onclick = e=>{
        e.preventDefault();
        img.src = el.href;
        cap.textContent = el.dataset.caption;
        lb.showModal();
      }
    });

    document.getElementById('lbClose').onclick = ()=> lb.close();
  </script>

</body>
</html>
